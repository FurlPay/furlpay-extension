<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furlpay</title>
    <style>
      body { width: 300px; margin: 0; background: #000; color: #fff; font-family: Inter, sans-serif; }
      .wrap { padding: 16px; }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .accent { color: #ff3b30; }
      .balance { font-size: 28px; font-weight: 800; margin: 12px 0; }
      .row { display: flex; justify-content: space-between; font-size: 13px; color: #8e8e93; padding: 6px 0; }
      button { width: 100%; padding: 12px; border: none; border-radius: 24px; background: #ff3b30; color: #fff; font-weight: 600; margin-top: 12px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Furl<span class="accent">pay</span></h1>
      <div class="balance" id="balance">$0.00</div>
      <div class="row"><span>Everyday Virtual</span><span id="card">•••• 4417</span></div>
      <div class="row"><span>Status</span><span id="status">Active</span></div>
      <button id="new-card">New single-use card</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
